version: 2

build:
  os: ubuntu-lts-latest
  tools:
    python: "3.14"
  jobs:
    post_checkout:
      - git fetch --unshallow || true

sphinx:
  builder: html
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - method: pip
      extra_requirements:
        - docs
      path: .
